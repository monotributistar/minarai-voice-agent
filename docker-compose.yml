services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      CMS_DIR: /app/cms
    volumes:
      - ../src/cms:/app/cms:ro
    ports:
      - "8787:8787"
    restart: unless-stopped

  stt:
    profiles: ["cpu"]
    build:
      context: ./stt
      dockerfile: Dockerfile.cpu
    env_file:
      - ./.env
    ports:
      - "9001:9001"
    restart: unless-stopped

  stt-gpu:
    profiles: ["gpu"]
    build:
      context: ./stt
      dockerfile: Dockerfile.gpu
    env_file:
      - ./.env
    environment:
      WHISPER_DEVICE: cuda
    ports:
      - "9001:9001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      default:
        aliases:
          - stt
    restart: unless-stopped

  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "9002:9002"
    volumes:
      - ./tts/voices:/app/voices
      - ./config:/app/config
    restart: unless-stopped

  tts-f5:
    profiles: ["f5"]
    build:
      context: ./tts-f5
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "9003:9003"
    volumes:
      - ./tts-f5/voices:/app/voices
      - ./config:/app/config
    restart: unless-stopped
